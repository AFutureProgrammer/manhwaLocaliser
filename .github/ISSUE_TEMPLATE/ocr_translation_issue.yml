name: OCR or translation issue
description: Report OCR, translation, glossary, memory, or review queue problems.
title: "[Text]: "
labels: ["ocr", "translation"]
body:
  - type: input
    id: page-region
    attributes:
      label: Page / region
      placeholder: "page 6, R-01"
    validations:
      required: true
  - type: textarea
    id: source-text
    attributes:
      label: Source OCR text
      description: Paste the OCR output if available.
  - type: textarea
    id: translation
    attributes:
      label: Translation output
      description: Paste the problematic translation if available.
  - type: textarea
    id: expected
    attributes:
      label: Expected text or behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual text or behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include model/provider, glossary or memory entries, screenshots, and whether the text was manually edited.
